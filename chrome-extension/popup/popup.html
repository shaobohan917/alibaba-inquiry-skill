<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿里巴巴询盘助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .status {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      font-size: 13px;
      color: #666;
    }

    .status-value {
      font-size: 13px;
      font-weight: 500;
    }

    .status-value.success {
      color: #22c55e;
    }

    .status-value.error {
      color: #ef4444;
    }

    .actions {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #FF6600;
      color: white;
    }

    .btn-primary:hover {
      background: #FF8533;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .message {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 8px;
      padding: 15px;
      font-size: 13px;
      line-height: 1.6;
    }

    .message.info {
      border-left: 3px solid #3b82f6;
    }

    .message.success {
      border-left: 3px solid #22c55e;
    }

    .message.error {
      border-left: 3px solid #ef4444;
    }

    .loading {
      text-align: center;
      padding: 20px;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #FF6600;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    .footer a {
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 阿里巴巴询盘助手</h1>
    <p>AI 驱动的智能询盘回复工具</p>
  </div>

  <div class="status" id="status-panel">
    <div class="status-item">
      <span class="status-label">登录状态</span>
      <span class="status-value success" id="login-status">检测中...</span>
    </div>
    <div class="status-item">
      <span class="status-label">当前页面</span>
      <span class="status-value" id="page-status">检测中...</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="process-btn">开始处理询盘</button>
    <button class="btn btn-secondary" id="settings-btn">设置</button>
  </div>

  <div class="message info" id="message-panel">
    💡 提示：在询盘列表页面点击"开始处理询盘"按钮，AI 将自动生成专业回复。
  </div>

  <div class="footer">
    <p>v1.0.0 | <a href="#" id="options-link">选项</a></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
