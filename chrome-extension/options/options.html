<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 阿里巴巴询盘助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 30px;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin-bottom: 0;
      cursor: pointer;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #FF6600;
      color: white;
    }

    .btn-primary:hover {
      background: #FF8533;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .message.show {
      display: block;
    }

    .help-text {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }

    .api-note {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      color: #92400e;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ 设置</h1>
      <p>阿里巴巴询盘助手 - 配置选项</p>
    </div>

    <div id="message" class="message"></div>

    <div class="card">
      <h2 class="card-title">API 配置</h2>

      <div class="api-note">
        💡 默认使用内置的 API Key，无需配置。如有需要，可以在此处填入您自己的 API 凭证。
      </div>

      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="text" id="api-key" placeholder="输入您的 API Key">
        <p class="help-text">用于调用 AI 模型生成回复内容</p>
      </div>

      <div class="form-group">
        <label for="api-secret">API Secret</label>
        <input type="password" id="api-secret" placeholder="输入您的 API Secret">
        <p class="help-text">API 认证密钥（可选）</p>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">回复设置</h2>

      <div class="form-group">
        <label for="reply-tone">回复语气</label>
        <select id="reply-tone">
          <option value="professional">专业正式</option>
          <option value="friendly">友好亲切</option>
          <option value="concise">简洁明了</option>
          <option value="detailed">详细周到</option>
        </select>
      </div>

      <div class="form-group">
        <label for="company-info">公司信息</label>
        <textarea id="company-info" placeholder="输入公司简介、主营产品等信息，将用于生成更专业的回复..."></textarea>
        <p class="help-text">这些信息将帮助 AI 生成更符合您公司风格的回复</p>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">通知设置</h2>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="enable-notifications">
        <label for="enable-notifications">启用桌面通知</label>
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="auto-process" checked>
        <label for="auto-process">自动检测新询盘</label>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">操作</h2>

      <div class="btn-group">
        <button class="btn btn-primary" id="save-btn">保存设置</button>
        <button class="btn btn-secondary" id="reset-btn">重置设置</button>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
